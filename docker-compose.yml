# ===================================
# Food Order System - Docker Compose
# ===================================


services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: food-order-db
    environment:
      POSTGRES_DB: foodorderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-order-network

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food-order-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: foodorderdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dGhpc0lzQVZlcnlTZWN1cmVKd3RTZWNyZXRLZXlGb3JGb29kT3JkZXJTeXN0ZW0yMDI0
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - food-order-network

volumes:
  postgres_data:
  uploads_data:

networks:
  food-order-network:
    driver: bridge
